<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>DASA Choir — Admin Panel</title>

    Netlify Identity Widget

  -->

  -->

</body>
</html>
