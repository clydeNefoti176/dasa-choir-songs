# ============================================================
# DASA Choir Songs — Decap CMS Configuration
# /admin/config.yml
#
# Backend: Netlify Identity + Git Gateway
# Repository: GitHub (connected via Netlify)
# ============================================================

backend:
  name: git-gateway
  branch: main       # Change to 'master' if your default branch is master
  commit_messages:
    create:  'feat(cms): add {{collection}} "{{slug}}"'
    update:  'fix(cms): update {{collection}} "{{slug}}"'
    delete:  'chore(cms): delete {{collection}} "{{slug}}"'
    uploadMedia:  'chore(assets): upload "{{path}}"'
    deleteMedia:  'chore(assets): delete "{{path}}"'

# ─── Media & Public Folder ────────────────────────────────────
media_folder: "assets/images"
public_folder: "/assets/images"

# ─── CMS UI Settings ─────────────────────────────────────────
locale: en

# ─── Collections ─────────────────────────────────────────────
collections:

  # ── Songs Collection ────────────────────────────────────────
  - name: "songs"
    label: "🎵 Songs"
    files:
      - label: "Song List"
        name: "song_list"
        file: "data/songs.json"
        description: "Manage the full choir song collection. Add, edit or remove songs."
        fields:
          - label: "Songs"
            name: "songs"
            widget: "list"
            label_singular: "Song"
            summary: "{{fields.title}}"
            add_to_top: true
            collapsed: false
            minimize_collapsed: true
            fields:
              - label: "Song Title"
                name: "title"
                widget: "string"
                hint: "The full title of the song as it will appear on the website."

              - label: "Lyrics"
                name: "lyrics"
                widget: "text"
                hint: "Paste or type the full lyrics. Line breaks are preserved automatically."

  # ── Slideshow Images Collection ──────────────────────────────
  # FIX: Uses a single `field` (not `fields` array) so Decap CMS
  # saves a clean string array: ["/assets/images/a.jpg", ...]
  # This is the most reliable format — no object/string mismatch.
  - name: "slideshow"
    label: "🖼️ Slideshow Images"
    files:
      - label: "Slideshow Images"
        name: "slideshow_images"
        file: "data/slideshow.json"
        description: "Upload images for the homepage hero slideshow. Each image rotates automatically."
        fields:
          - label: "Images"
            name: "images"
            widget: "list"
            label_singular: "Image"
            add_to_top: false
            # Single `field` (not `fields`) = saves as plain string array
            # ["path1.jpg", "path2.jpg"] — no format ambiguity
            field:
              label: "Image File"
              name: "image"
              widget: "image"
              allow_multiple: false
              hint: "Recommended: 1920×1080px, JPG/PNG/WebP, under 2MB."
