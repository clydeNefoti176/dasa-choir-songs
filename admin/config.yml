# ============================================================
# DASA Choir Songs — Decap CMS Configuration
# /admin/config.yml
#
# Backend: Netlify Identity + Git Gateway
# Repository: GitHub (connected via Netlify)
# ============================================================

backend:
  name: git-gateway
  branch: main       # Change to 'master' if your default branch is master
  commit_messages:
    create:  'feat(cms): add {{collection}} "{{slug}}"'
    update:  'fix(cms): update {{collection}} "{{slug}}"'
    delete:  'chore(cms): delete {{collection}} "{{slug}}"'
    uploadMedia:  'chore(assets): upload "{{path}}"'
    deleteMedia:  'chore(assets): delete "{{path}}"'

# ─── Media & Public Folder ────────────────────────────────────
# Where uploaded images are saved in the repo
media_folder: "assets/images"

# The public URL path for those images
public_folder: "/assets/images"

# ─── CMS UI Settings ─────────────────────────────────────────
locale: en
site_url: /   # Set this to your live Netlify URL for the preview button

# ─── Collections ─────────────────────────────────────────────
collections:

  # ── Songs Collection ────────────────────────────────────────
  # All songs are stored in a single JSON file as an array.
  # Admin can add, edit, reorder, and delete songs here.
  - name: "songs"
    label: "🎵 Songs"
    files:
      - label: "Song List"
        name: "song_list"
        file: "data/songs.json"
        description: "Manage the full choir song collection. Add, edit or remove songs."
        fields:
          - label: "Songs"
            name: "songs"
            widget: "list"
            label_singular: "Song"
            summary: "{{fields.title}}"
            add_to_top: true
            collapsed: false
            minimize_collapsed: true
            fields:
              - label: "Song Title"
                name: "title"
                widget: "string"
                hint: "The full title of the song as it will appear on the website."
                pattern:
                  - ".{1,120}"
                  - "Title must be between 1 and 120 characters"

              - label: "Lyrics"
                name: "lyrics"
                widget: "text"
                hint: "Paste or type the full lyrics. Line breaks are preserved automatically."

  # ── Slideshow Images Collection ──────────────────────────────
  # Manages the hero slideshow on the homepage.
  # Images are uploaded to /assets/images/ and referenced here.
  - name: "slideshow"
    label: "🖼️ Slideshow Images"
    files:
      - label: "Slideshow Images"
        name: "slideshow_images"
        file: "data/slideshow.json"
        description: "Upload and manage the hero slideshow images shown on the homepage."
        fields:
          - label: "Images"
            name: "images"
            widget: "list"
            label_singular: "Image"
            summary: "{{fields.caption | default('Untitled Image')}}"
            add_to_top: true
            collapsed: false
            fields:
              - label: "Image"
                name: "image"
                widget: "image"
                allow_multiple: false
                hint: "Recommended size: 1920×1080px or wider. JPG/PNG/WebP accepted."

              - label: "Caption (optional)"
                name: "caption"
                widget: "string"
                required: false
                hint: "An optional short description for accessibility purposes."
